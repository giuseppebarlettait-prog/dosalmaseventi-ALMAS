        /* --- VARIABILI E RESET --- */
        :root {
            --bg-dark: #0b0507;
            --card-dark: #140a0d;
            --pink-primary: #e65c88;
            --pink-light: #f7a3be;
            --gold: #dfb76c;
            --text-light: #ffffff;
            --text-muted: #a59298;
            --border-color: #3a1a24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        h1, h2, h3, .brand-name {
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
        }

        .cursive {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            text-transform: none !important;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        /* --- SENSORI FLUTTUANTI INTERFACCIA --- */
        .floating-actions {
            position: fixed;
            right: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 999;
        }
        .float-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .float-wa { background-color: #e65c88; }
        .float-share { background-color: rgba(230, 92, 136, 0.6); }

            top: 0;
            left: 0;
            width: 100%;

            justify-content: space-between;
            align-items: center;
            padding: 25px 5%;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

            font-size: 24px;
            color: var(--pink-light);
            line-height: 1;
