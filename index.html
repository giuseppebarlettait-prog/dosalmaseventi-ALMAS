<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dos Almas Napoli - Exclusive Night Experience</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        :root {
            --bg-dark: #0a0508;
            --bg-card: #140b10;
            --pink-accent: #f07fa1;
            --pink-light: #fcd7e2;
            --text-gold: #e2b9c6;
            --text-muted: #8e737f;
        }
        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }
        h1, h2, h3, .brand-name {
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
        }
        .italic-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        /* Navbar Fissa */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: linear-gradient(to bottom, rgba(10,5,8,0.95), transparent);
            position: fixed;
            width: 100%;
            z-index: 100;
        }
        .logo h2 {
            font-size: 24px;
            color: var(--pink-light);
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        nav a:hover {
            color: var(--pink-accent);
        }
        .btn-book-top {
            background-color: var(--pink-accent);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Hero */
        .hero {
            position: relative;
            height: 100vh;
            background: linear-gradient(rgba(10, 5, 8, 0.4), rgba(10, 5, 8, 0.95)), 
                        url('https://images.unsplash.com/photo-1533105079780-92b9be482077?q=80&w=1920') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 100px;
        }
        .hero-subtitle {
            font-size: 12px;
            color: var(--text-gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        .hero h1 {
            font-size: 75px;
            color: var(--pink-accent);
            line-height: 1;
            margin-bottom: 5px;
        }
        .hero .city {
            font-size: 35px;
            margin-bottom: 30px;
            color: #fff;
        }
        .btn-hero {
            background-color: var(--pink-accent);
            color: #000;
            padding: 15px 35px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .live-counter {
            margin-top: 30px;
            background-color: rgba(20, 11, 16, 0.8);
            border: 1px solid rgba(240, 127, 161, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--pink-light);
        }
